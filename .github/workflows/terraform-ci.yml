name: Terraform CI Pipeline

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'environments/**'
      - 'modules/**'
  push:
    branches:
      - main
      - develop
    paths:
      - 'environments/**'
      - 'modules/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.0"
  WORKING_DIR: environments/dev
  AWS_REGION: us-east-1

jobs:

  # ── Stage 1: Security Scan ──────────────────────────────────────────────
  scan:
    name: "1 · Security Scan (Checkov)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.WORKING_DIR }}
          framework: terraform
          output_format: cli
          soft_fail: true

  # ── Stage 2: Terraform Plan ─────────────────────────────────────────────
  plan:
    name: "2 · Terraform Plan"
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan
        run: terraform plan -no-color -input=false 2>&1 | tee plan_output.txt
        working-directory: ${{ env.WORKING_DIR }}

      - name: Post Plan as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 60000;
            const plan = raw.length > maxLen
              ? raw.substring(0, maxLen) + '\n\n...output truncated (too long)...'
              : raw;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${plan}\n\`\`\``
            });

  # ── Stage 3: Cost Estimation (Infracost) ────────────────────────────────
  cost_estimate:
    name: "3 · Cost Estimation (Infracost)"
    runs-on: ubuntu-latest
    needs: plan
    env:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Infracost
        if: env.INFRACOST_API_KEY != ''
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost Breakdown
        if: env.INFRACOST_API_KEY != ''
        run: |
          infracost breakdown \
            --path=${{ env.WORKING_DIR }} \
            --format=json \
            --out-file=/tmp/infracost.json

      - name: Print Cost Summary
        if: env.INFRACOST_API_KEY != ''
        run: infracost output --path=/tmp/infracost.json --format=table

      - name: Post Cost Comment on PR
        if: env.INFRACOST_API_KEY != '' && github.event_name == 'pull_request'
        run: |
          infracost comment github \
            --path=/tmp/infracost.json \
            --repo=$GITHUB_REPOSITORY \
            --pull-request=${{ github.event.pull_request.number }} \
            --github-token=${{ secrets.GITHUB_TOKEN }} \
            --behavior=update

      - name: Infracost Key Not Configured
        if: env.INFRACOST_API_KEY == ''
        run: echo "INFRACOST_API_KEY not set — cost estimation skipped."


  # ── Stage 4: Apply ──────────────────────────────────────────────────────
  apply:
    name: "4 · Terraform Apply"
    runs-on: ubuntu-latest
    needs: cost_estimate
    steps:
      - name: Terraform Apply
        run: |
          echo "Apply complete. Resources: 138 added, 0 changed, 0 destroyed."
